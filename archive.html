<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archive – Post-AGI</title>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --paper: #fdfcfa;
      --paper-dark: #f8f7f5;
      --ink: #1a1a1a;
      --ink-light: #6b7280;
      --ink-faint: #9ca3af;
      --rule: #e5e5e5;
      --rule-dark: #d4d4d4;
      --accent: #c2410c;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--paper);
      color: var(--ink);
      line-height: 1.6;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    .masthead {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--ink);
    }

    .logo {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 32px;
      font-weight: 500;
      letter-spacing: -0.03em;
      color: var(--ink);
      text-decoration: none;
    }

    .nav {
      display: flex;
      gap: 32px;
    }

    .nav a {
      font-size: 14px;
      color: var(--ink-light);
      text-decoration: none;
      letter-spacing: 0.01em;
    }

    .nav a:hover {
      color: var(--ink);
    }

    .main {
      max-width: 800px;
      margin: 0 auto;
      padding: 56px 24px;
    }

    h1 {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 38px;
      font-weight: 400;
      letter-spacing: -0.02em;
      margin-bottom: 48px;
    }

    .year-section {
      margin-bottom: 48px;
    }

    .year-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-faint);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--rule);
    }

    .archive-list {
      list-style: none;
    }

    .archive-item {
      display: grid;
      grid-template-columns: 80px 1fr auto;
      gap: 16px;
      padding: 16px 0;
      border-bottom: 1px solid var(--rule);
      align-items: baseline;
    }

    .archive-item:last-child {
      border-bottom: none;
    }

    .archive-date {
      font-size: 13px;
      color: var(--ink-faint);
    }

    .archive-title {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 18px;
      font-weight: 400;
    }

    .archive-title a {
      color: var(--ink);
      text-decoration: none;
    }

    .archive-title a:hover {
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }

    .archive-category {
      font-size: 11px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    .site-footer {
      max-width: 800px;
      margin: 0 auto;
      padding: 48px 24px;
      border-top: 1px solid var(--rule-dark);
      font-size: 13px;
      color: var(--ink-faint);
    }

    @media (max-width: 600px) {
      .masthead {
        flex-direction: column;
        gap: 16px;
        align-items: flex-start;
        padding: 24px;
      }

      h1 {
        font-size: 28px;
      }

      .archive-item {
        grid-template-columns: 1fr;
        gap: 4px;
      }

      .archive-category {
        order: -1;
      }
    }
  </style>
</head>
<body>

  <header class="masthead">
    <a href="index.html" class="logo">Post-AGI</a>
    <nav class="nav">
      <a href="archive.html">Archive</a>
      <a href="about.html">About</a>
      <a href="subscribe.html">Subscribe</a>
    </nav>
  </header>

  <main class="main">
    <h1>Archive</h1>

    <section class="year-section">
      <div class="year-label">2026</div>
      <ul class="archive-list">

        <li class="archive-item">
          <span class="archive-date">Mar 11</span>
          <h3 class="archive-title"><a href="articles/ai-as-coworker.html">AI as a Coworker: What It Can and Can't Do</a></h3>
          <span class="archive-category">Capability</span>
        </li>

        <li class="archive-item">
          <span class="archive-date">Mar 4</span>
          <h3 class="archive-title"><a href="articles/governance-capacity.html">Can Institutions Function During the AI Transition?</a></h3>
          <span class="archive-category">Governance</span>
        </li>

        <li class="archive-item">
          <span class="archive-date">Mar 3</span>
          <h3 class="archive-title"><a href="articles/ghost-gdp.html">Ghost GDP</a></h3>
          <span class="archive-category">Economics</span>
        </li>

      </ul>
    </section>

  </main>

  <footer class="site-footer">
    <p>© 2026 Post-AGI</p>
  </footer>

</body>
</html>
